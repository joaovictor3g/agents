version: 2

project_name: agents

builds:
  - main: ./cmd/agents
    binary: agents
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]

homebrew_casks:
  - repository:
      owner: joaovictor3g
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/joaovictor3g/agents
    description: Orchestrate parallel AI coding agents in git worktrees and tmux windows
    dependencies:
      - formula: tmux
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/agents"]
          end

checksum:
  name_template: checksums.txt
